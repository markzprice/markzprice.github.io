<style>
.tv-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));

  margin-top: 8px;
}

.tv-link {
  display: flex;
  align-items: center;
  border: 1px solid var(--ink-rule);
  padding: 12px 14px;
  color: var(--ink-mid);
  font-size: 13px;
  font-weight: 600;
  transition: border-color 0.15s, color 0.15s;
  text-decoration: none;
  background: transparent;
}
.tv-link:hover {
  border-color: var(--ink);
  color: var(--ink);
}

.tv-section-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-light);
  border-bottom: 2px solid var(--ink);
  padding-bottom: 7px;
  margin: 32px 0 10px;
}
.tv-section-label:first-child { margin-top: 0; }
</style>
