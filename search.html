<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Search</title>
<link rel="stylesheet" href="style.css">
<style>
.search-wrap {
  max-width: 100%;
  margin: 0 auto;
}

/* Search input */
.search-bar {
  display: flex;
  gap: 0;
  max-width: 680px;
  margin: 0 auto 16px;
}
.search-bar input {
  flex: 1;
  font-family: var(--serif);
  font-size: 18px;
  padding: 14px 18px;
  border: 2px solid var(--ink);
  border-right: none;
  background: #fff;
  color: var(--ink);
  outline: none;
}
.search-bar input::placeholder {
  color: var(--ink-light);
  font-style: italic;
}
.search-bar button {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 14px 24px;
  border: 2px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.search-bar button:hover {
  background: var(--red);
  border-color: var(--red);
}

/* Mode selector */
.mode-row {
  display: flex;
  gap: 0;
  max-width: 680px;
  margin: 0 auto 12px;
}
.mode-btn {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 8px 18px;
  border: 1.5px solid var(--ink-rule);
  background: transparent;
  color: var(--ink-light);
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn:first-child { border-right: none; }
.mode-btn.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--paper);
}

/* Settings row */
.settings-row {
  max-width: 680px;
  margin: 0 auto 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.settings-toggle {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-light);
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  transition: color 0.15s;
}
.settings-toggle:hover { color: var(--ink); }
.directory-link {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-light);
  border-bottom: 1px solid var(--ink-rule);
  padding-bottom: 1px;
  transition: color 0.15s;
  margin-left: auto;
}
.directory-link:hover { color: var(--ink); }

.settings-panel {
  display: none;
  max-width: 680px;
  margin: 0 auto 24px;
  padding: 16px 20px;
  background: var(--paper-2);
  border: 1px solid var(--ink-rule);
}
.settings-panel.visible { display: block; }
.settings-panel label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-mid);
  margin-bottom: 6px;
}
.settings-panel input[type="text"] {
  width: 100%;
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  border: 1px solid var(--ink-rule);
  background: var(--paper);
  color: var(--ink);
  margin-bottom: 4px;
}
.settings-note {
  font-family: var(--serif);
  font-size: 11px;
  font-style: italic;
  color: var(--ink-light);
  margin-bottom: 12px;
}
.settings-save {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 6px 14px;
  border: 1.5px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  cursor: pointer;
}
.settings-save:hover { background: var(--red); border-color: var(--red); }

/* ===== RESULTS GRID ===== */
.results-grid {
  display: none;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 12px;
  margin-top: 20px;
}
.results-grid.visible { display: grid; }

.result-panel {
  border: 1.5px solid var(--ink-rule);
  background: #fff;
  display: flex;
  flex-direction: column;
  min-height: 500px;
  max-height: 80vh;
  overflow: hidden;
}

/* Panel header */
.panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--paper-2);
  border-bottom: 1px solid var(--ink-rule);
  flex-shrink: 0;
}
.panel-name {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.03em;
}
.panel-lang {
  font-family: var(--mono);
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--paper);
  padding: 1px 5px;
  border-radius: 2px;
  background: var(--ink-light);
}
.panel-lang.lang-fr { background: #2656a8; }
.panel-lang.lang-ru { background: #a82626; }
.panel-lang.lang-ko { background: #26a852; }
.panel-lang.lang-zh { background: #a86826; }
.panel-query {
  font-family: var(--serif);
  font-size: 11px;
  font-style: italic;
  color: var(--ink-light);
  margin-left: auto;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.panel-open {
  font-family: var(--mono);
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-light);
  border: 1px solid var(--ink-rule);
  background: transparent;
  padding: 2px 6px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
  flex-shrink: 0;
}
.panel-open:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

/* Panel body: either iframe or API results */
.panel-body {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.panel-body iframe {
  width: 100%;
  height: 100%;
  border: none;
}
.panel-body .api-results {
  overflow-y: auto;
  height: 100%;
  padding: 8px 12px;
}

/* API result items */
.r-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--ink-rule);
}
.r-item:last-child { border-bottom: none; }
.r-item a {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink);
  display: block;
  line-height: 1.35;
  transition: color 0.1s;
}
.r-item a:hover { color: var(--red); }
.r-url {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-light);
  margin-top: 2px;
  letter-spacing: 0.02em;
  word-break: break-all;
}
.r-desc {
  font-family: var(--serif);
  font-size: 12px;
  color: var(--ink-mid);
  margin-top: 3px;
  line-height: 1.45;
}
.r-loading {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-light);
  padding: 20px 0;
}
.r-error {
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: var(--ink-light);
  padding: 20px 0;
  text-align: center;
}

/* Iframe blocked overlay */
.iframe-blocked {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  background: var(--paper);
  padding: 24px;
  text-align: center;
}
.iframe-blocked.visible { display: flex; }
.iframe-blocked p {
  font-family: var(--serif);
  font-size: 13px;
  color: var(--ink-light);
  font-style: italic;
}
.iframe-blocked a {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 8px 16px;
  border: 1.5px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  transition: background 0.15s;
}
.iframe-blocked a:hover { background: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="/" class="site-name">Mark Price</a>
  </div>
</header>

<main class="page" style="max-width:1400px;">

  <div class="page-hero">
    <h1>Parallel Search</h1>
    <p>Search across independent indexes. Compare results side by side.</p>
  </div>

  <div class="search-wrap">

    <div class="search-bar">
      <input type="text" id="q" placeholder="What are you looking for?" autofocus>
      <button id="go">Search</button>
    </div>

    <div class="mode-row">
      <button class="mode-btn active" data-mode="perspectives">Perspectives</button>
      <button class="mode-btn" data-mode="deepweb">Deep Web</button>
    </div>

    <div class="settings-row">
      <button class="settings-toggle" id="stoggle">Settings</button>
      <a href="engines.html" class="directory-link">Search Directory</a>
    </div>

    <div class="settings-panel" id="spanel">
      <label for="deepl-key">DeepL API Key (Free tier)</label>
      <input type="text" id="deepl-key" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx:fx">
      <div class="settings-note">Required for auto-translation. Get free at deepl.com/pro#developer. Without it, non-English engines get the English query.</div>
      <button class="settings-save" id="ssave">Save</button>
    </div>

    <!-- Results grid: filled dynamically -->
    <div class="results-grid" id="grid"></div>

  </div>

</main>

<footer class="site-footer">
  <span class="footer-left">mark price · 2026</span>
</footer>

<script>
// ===== CONFIG =====
let mode = 'perspectives';
let deeplKey = localStorage.getItem('deepl_api_key') || '';

// Search engine URL patterns
const url = {
  google:   q => `https://www.google.com/search?igu=1&q=${enc(q)}`,
  brave:    q => `https://search.brave.com/search?q=${enc(q)}`,
  stract:   q => `https://stract.com/search?q=${enc(q)}`,
  mojeek:   q => `https://www.mojeek.com/search?q=${enc(q)}`,
  qwant:    q => `https://www.qwant.com/?q=${enc(q)}`,
  yandex:   q => `https://yandex.com/search/?text=${enc(q)}`,
  naver:    q => `https://search.naver.com/search.naver?query=${enc(q)}`,
  baidu:    q => `https://www.baidu.com/s?wd=${enc(q)}`,
  ddg:      q => `https://lite.duckduckgo.com/lite/?q=${enc(q)}`,
  marginalia: q => `https://search.marginalia.nu/search?query=${enc(q)}`,
  wiby:     q => `https://wiby.me/?q=${enc(q)}`,
};

function enc(s) { return encodeURIComponent(s); }

// ===== ENGINE DEFINITIONS =====
const perspectives = [
  { id: 'google',  name: 'Google',  lang: 'EN', langClass: '', type: 'iframe' },
  { id: 'brave',   name: 'Brave',   lang: 'EN', langClass: '', type: 'iframe' },
  { id: 'stract',  name: 'Stract',  lang: 'EN', langClass: '', type: 'iframe' },
  { id: 'mojeek',  name: 'Mojeek',  lang: 'EN', langClass: '', type: 'iframe' },
  { id: 'qwant',   name: 'Qwant',   lang: 'FR', langClass: 'lang-fr', translate: 'FR', type: 'iframe' },
  { id: 'yandex',  name: 'Yandex',  lang: 'RU', langClass: 'lang-ru', translate: 'RU', type: 'iframe' },
  { id: 'naver',   name: 'Naver',   lang: 'KO', langClass: 'lang-ko', translate: 'KO', type: 'iframe' },
  { id: 'baidu',   name: 'Baidu',   lang: 'ZH', langClass: 'lang-zh', translate: 'ZH', type: 'iframe' },
];

const deepweb = [
  { id: 'marginalia', name: 'Marginalia', lang: 'API', langClass: '', type: 'iframe' },
  { id: 'wiby',       name: 'Wiby',       lang: 'API', langClass: '', type: 'iframe' },
  { id: 'stract',     name: 'Stract',     lang: 'EN',  langClass: '', type: 'iframe' },
  { id: 'mojeek',     name: 'Mojeek',     lang: 'EN',  langClass: '', type: 'iframe' },
  { id: 'ddg',        name: 'DuckDuckGo', lang: 'EN',  langClass: '', type: 'iframe' },
  { id: 'google',     name: 'Google',     lang: 'EN',  langClass: '', type: 'iframe' },
];

// ===== DEEPL =====
async function translateDeepL(text, targetLang) {
  if (!deeplKey) return null;
  try {
    const res = await fetch('https://api-free.deepl.com/v2/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ auth_key: deeplKey, text, target_lang: targetLang })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.translations?.[0]?.text || null;
  } catch(e) { return null; }
}

// ===== BUILD PANEL =====
function makePanel(engine, query, translatedQuery) {
  const actualQuery = translatedQuery || query;
  const searchUrl = url[engine.id](actualQuery);
  // Direct link (always opens in new tab as fallback)
  const directUrl = url[engine.id](actualQuery);

  const panel = document.createElement('div');
  panel.className = 'result-panel';
  panel.innerHTML = `
    <div class="panel-header">
      <span class="panel-name">${engine.name}</span>
      <span class="panel-lang ${engine.langClass}">${engine.lang}</span>
      ${translatedQuery ? `<span class="panel-query" title="${esc(translatedQuery)}">${esc(translatedQuery)}</span>` : ''}
      <a class="panel-open" href="${directUrl}" target="_blank" rel="noopener">open</a>
    </div>
    <div class="panel-body">
      <iframe src="${searchUrl}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" referrerpolicy="no-referrer"></iframe>
      <div class="iframe-blocked">
        <p>This engine blocks embedded viewing.</p>
        <a href="${directUrl}" target="_blank" rel="noopener">Open in new tab</a>
      </div>
    </div>
  `;

  // Detect iframe blocking: if iframe fails to load content, show fallback
  const iframe = panel.querySelector('iframe');
  const blocked = panel.querySelector('.iframe-blocked');

  // Use a timeout check: if iframe hasn't loaded in 5s, show fallback
  let loaded = false;
  iframe.addEventListener('load', () => { loaded = true; });
  setTimeout(() => {
    if (!loaded) {
      iframe.style.display = 'none';
      blocked.classList.add('visible');
    }
  }, 6000);

  return panel;
}

function esc(s) {
  const d = document.createElement('span');
  d.textContent = s;
  return d.innerHTML;
}

// ===== SEARCH =====
async function doSearch() {
  const query = document.getElementById('q').value.trim();
  if (!query) return;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.classList.add('visible');

  const engines = mode === 'perspectives' ? perspectives : deepweb;

  // Start translations in parallel for engines that need them
  const translationPromises = {};
  for (const eng of engines) {
    if (eng.translate) {
      translationPromises[eng.id] = translateDeepL(query, eng.translate);
    }
  }

  // Wait for all translations
  const translations = {};
  for (const [id, promise] of Object.entries(translationPromises)) {
    translations[id] = await promise;
  }

  // Build all panels
  for (const eng of engines) {
    const translated = translations[eng.id] || null;
    const panel = makePanel(eng, query, translated);
    grid.appendChild(panel);
  }
}

// ===== EVENT LISTENERS =====
document.getElementById('go').addEventListener('click', doSearch);
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    // Clear results when switching modes
    document.getElementById('grid').innerHTML = '';
    document.getElementById('grid').classList.remove('visible');
  });
});

document.getElementById('stoggle').addEventListener('click', () => {
  const p = document.getElementById('spanel');
  p.classList.toggle('visible');
  if (p.classList.contains('visible')) document.getElementById('deepl-key').value = deeplKey;
});

document.getElementById('ssave').addEventListener('click', () => {
  deeplKey = document.getElementById('deepl-key').value.trim();
  localStorage.setItem('deepl_api_key', deeplKey);
  document.getElementById('spanel').classList.remove('visible');
  document.getElementById('stoggle').textContent = deeplKey ? 'Settings (DeepL ✓)' : 'Settings';
});

if (deeplKey) document.getElementById('stoggle').textContent = 'Settings (DeepL ✓)';
</script>

</body>
</html>
