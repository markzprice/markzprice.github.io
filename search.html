<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Search</title>
<link rel="stylesheet" href="style.css">
<style>
/* Search bar */
.search-bar {
  display: flex;
  gap: 0;
  max-width: 680px;
  margin: 0 auto 16px;
}
.search-bar input {
  flex: 1;
  font-family: var(--serif);
  font-size: 18px;
  padding: 14px 18px;
  border: 2px solid var(--ink);
  border-right: none;
  background: #fff;
  color: var(--ink);
  outline: none;
}
.search-bar input::placeholder { color: var(--ink-light); font-style: italic; }
.search-bar button {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 14px 24px;
  border: 2px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  cursor: pointer;
  white-space: nowrap;
}
.search-bar button:hover { background: var(--red); border-color: var(--red); }

/* Mode selector */
.mode-row {
  display: flex;
  gap: 0;
  max-width: 680px;
  margin: 0 auto 12px;
}
.mode-btn {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 8px 18px;
  border: 1.5px solid var(--ink-rule);
  background: transparent;
  color: var(--ink-light);
  cursor: pointer;
}
.mode-btn:first-child { border-right: none; }
.mode-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

/* Utility row */
.util-row {
  max-width: 680px;
  margin: 0 auto 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.util-btn {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-light);
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
}
.util-btn:hover { color: var(--ink); }
.util-link {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-light);
  border-bottom: 1px solid var(--ink-rule);
  padding-bottom: 1px;
  margin-left: auto;
}
.util-link:hover { color: var(--ink); }

/* Settings */
.settings-panel {
  display: none;
  max-width: 680px;
  margin: 0 auto 24px;
  padding: 16px 20px;
  background: var(--paper-2);
  border: 1px solid var(--ink-rule);
}
.settings-panel.visible { display: block; }
.settings-panel label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-mid);
  margin-bottom: 6px;
}
.settings-panel input[type="text"] {
  width: 100%;
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  border: 1px solid var(--ink-rule);
  background: var(--paper);
  color: var(--ink);
  margin-bottom: 4px;
}
.s-note { font-family: var(--serif); font-size: 11px; font-style: italic; color: var(--ink-light); margin-bottom: 12px; }
.s-save {
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.1em; padding: 6px 14px; border: 1.5px solid var(--ink);
  background: var(--ink); color: var(--paper); cursor: pointer;
}
.s-save:hover { background: var(--red); border-color: var(--red); }

/* ===== RESULTS GRID ===== */
.results-grid {
  display: none;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 12px;
  margin-top: 20px;
}
.results-grid.visible { display: grid; }

/* --- Panels --- */
.panel {
  border: 1.5px solid var(--ink-rule);
  background: #fff;
  display: flex;
  flex-direction: column;
  min-height: 480px;
  max-height: 80vh;
  overflow: hidden;
}
.panel-hd {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--paper-2);
  border-bottom: 1px solid var(--ink-rule);
  flex-shrink: 0;
}
.p-name { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--ink); letter-spacing: 0.03em; }
.p-badge {
  font-family: var(--mono); font-size: 8px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--paper); padding: 1px 5px; border-radius: 2px;
  background: var(--ink-light);
}
.p-badge.b-fr { background: #2656a8; }
.p-badge.b-ru { background: #a82626; }
.p-badge.b-ko { background: #26a852; }
.p-badge.b-zh { background: #a86826; }
.p-badge.b-api { background: var(--red); }
.p-query {
  font-family: var(--serif); font-size: 11px; font-style: italic;
  color: var(--ink-light); margin-left: auto; max-width: 200px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.p-open {
  font-family: var(--mono); font-size: 8px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--ink-light); border: 1px solid var(--ink-rule);
  background: transparent; padding: 2px 6px; cursor: pointer; text-decoration: none;
  flex-shrink: 0;
}
.p-open:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* Panel body */
.panel-body {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.panel-body iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* API results list */
.api-list {
  overflow-y: auto;
  height: 100%;
  padding: 6px 12px;
}
.api-list .r {
  padding: 10px 0;
  border-bottom: 1px solid var(--ink-rule);
}
.api-list .r:last-child { border-bottom: none; }
.api-list .r a {
  font-family: var(--serif); font-size: 14px; color: var(--ink);
  display: block; line-height: 1.35;
}
.api-list .r a:hover { color: var(--red); }
.api-list .r-u {
  font-family: var(--mono); font-size: 9px; color: var(--ink-light);
  margin-top: 2px; word-break: break-all;
}
.api-list .r-d {
  font-family: var(--serif); font-size: 12px; color: var(--ink-mid);
  margin-top: 3px; line-height: 1.45;
}
.api-list .r-status {
  font-family: var(--mono); font-size: 11px; color: var(--ink-light);
  padding: 16px 0;
}

/* Click-to-open panel (no iframe, no API) */
.click-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
  gap: 16px;
}
.click-body .cb-desc {
  font-family: var(--serif); font-size: 14px; color: var(--ink-mid);
  line-height: 1.6; max-width: 320px;
}
.click-body .cb-go {
  display: inline-block;
  font-family: var(--mono); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.12em; padding: 12px 28px; border: 2px solid var(--ink);
  background: var(--ink); color: var(--paper); text-decoration: none;
  transition: background 0.15s;
}
.click-body .cb-go:hover { background: var(--red); border-color: var(--red); }
.click-body .cb-note {
  font-family: var(--mono); font-size: 9px; color: var(--ink-light);
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="/" class="site-name">Mark Price</a>
  </div>
</header>

<main class="page" style="max-width:1400px;">

  <div class="page-hero">
    <h1>Parallel Search</h1>
    <p>Search across independent indexes. Compare results side by side.</p>
  </div>

  <div class="search-bar">
    <input type="text" id="q" placeholder="What are you looking for?" autofocus>
    <button id="go">Search</button>
  </div>

  <div class="mode-row">
    <button class="mode-btn active" data-mode="perspectives">Perspectives</button>
    <button class="mode-btn" data-mode="deepweb">Deep Web</button>
  </div>

  <div class="util-row">
    <button class="util-btn" id="stoggle">Settings</button>
    <a href="engines.html" class="util-link">Search Directory</a>
  </div>

  <div class="settings-panel" id="spanel">
    <label for="dk">DeepL API Key (Free tier)</label>
    <input type="text" id="dk" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx:fx">
    <div class="s-note">Required for auto-translation. Get free at deepl.com/pro#developer</div>
    <button class="s-save" id="ssave">Save</button>
  </div>

  <div class="results-grid" id="grid"></div>

</main>

<footer class="site-footer">
  <span class="footer-left">mark price · 2026</span>
</footer>

<script>
// ===== STATE =====
let mode = 'perspectives';
let dk = localStorage.getItem('deepl_api_key') || '';

const enc = s => encodeURIComponent(s);
const esc = s => { const d = document.createElement('span'); d.textContent = s; return d.innerHTML; };

// ===== SEARCH URLs =====
const surl = {
  google:     q => `https://www.google.com/search?igu=1&q=${enc(q)}`,
  brave:      q => `https://search.brave.com/search?q=${enc(q)}`,
  stract:     q => `https://stract.com/search?q=${enc(q)}`,
  mojeek:     q => `https://www.mojeek.com/search?q=${enc(q)}`,
  qwant:      q => `https://www.qwant.com/?q=${enc(q)}`,
  yandex:     q => `https://yandex.com/search/?text=${enc(q)}`,
  naver:      q => `https://search.naver.com/search.naver?query=${enc(q)}`,
  baidu:      q => `https://www.baidu.com/s?wd=${enc(q)}`,
  marginalia: q => `https://search.marginalia.nu/search?query=${enc(q)}`,
  wiby:       q => `https://wiby.me/?q=${enc(q)}`,
};

// ===== ENGINE CONFIGS =====
// type: 'iframe' = embed directly, 'api' = fetch results, 'click' = button to open
const perspectives_engines = [
  { id: 'google',  name: 'Google',  badge: 'EN', bc: '', type: 'iframe',
    desc: 'Largest index. Your baseline.' },
  { id: 'marginalia', name: 'Marginalia', badge: 'API', bc: 'b-api', type: 'api',
    desc: 'Non-commercial small web. Blogs, hobbyist pages, real humans.' },
  { id: 'brave',   name: 'Brave',   badge: 'EN', bc: '', type: 'click',
    desc: 'Independent index, privacy-focused. Different ranking from Google.' },
  { id: 'stract',  name: 'Stract',  badge: 'EN', bc: '', type: 'click',
    desc: 'Open source, own crawler. No corporate agenda.' },
  { id: 'mojeek',  name: 'Mojeek',  badge: 'EN', bc: '', type: 'click',
    desc: 'UK-based, fully independent. Surfaces things nobody else does.' },
  { id: 'qwant',   name: 'Qwant',   badge: 'FR', bc: 'b-fr', type: 'click', translate: 'FR',
    desc: 'European index. Strong for French/German content, EU perspective.' },
  { id: 'yandex',  name: 'Yandex',  badge: 'RU', bc: 'b-ru', type: 'click', translate: 'RU',
    desc: 'Russia\'s engine. Completely different take on global events.' },
  { id: 'naver',   name: 'Naver',   badge: 'KO', bc: 'b-ko', type: 'click', translate: 'KO',
    desc: 'South Korea\'s dominant engine. Strong for tech and East Asian coverage.' },
  { id: 'baidu',   name: 'Baidu',   badge: 'ZH', bc: 'b-zh', type: 'click', translate: 'ZH',
    desc: 'China\'s engine. Different internet entirely. Great for hardware and manufacturing.' },
];

const deepweb_engines = [
  { id: 'marginalia', name: 'Marginalia', badge: 'API', bc: 'b-api', type: 'api',
    desc: 'Non-commercial web. Personal blogs, hobbyist pages.' },
  { id: 'wiby',    name: 'Wiby', badge: 'API', bc: 'b-api', type: 'api',
    desc: 'Old-school lightweight web pages. The 2003 internet.' },
  { id: 'google',  name: 'Google', badge: 'EN', bc: '', type: 'iframe',
    desc: 'Mainstream baseline for comparison.' },
  { id: 'stract',  name: 'Stract', badge: 'EN', bc: '', type: 'click',
    desc: 'Open source, independent ranking.' },
  { id: 'mojeek',  name: 'Mojeek', badge: 'EN', bc: '', type: 'click',
    desc: 'Fully independent UK crawler.' },
  { id: 'brave',   name: 'Brave',  badge: 'EN', bc: '', type: 'click',
    desc: 'Independent index, different from Google and Bing.' },
];

// ===== CORS PROXY =====
async function corsProxy(url, timeout = 10000) {
  const race = fn => Promise.race([fn(), new Promise((_, rej) => setTimeout(() => rej('timeout'), timeout))]);
  try {
    return await race(() => fetch(`https://corsproxy.io/?${enc(url)}`).then(r => r.text()));
  } catch(e) {}
  try {
    const res = await race(() => fetch(`https://api.allorigins.win/get?url=${enc(url)}`).then(r => r.json()));
    return res.contents;
  } catch(e) {}
  return null;
}

// ===== DeepL =====
async function translate(text, lang) {
  if (!dk) return null;
  try {
    const res = await fetch('https://api-free.deepl.com/v2/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ auth_key: dk, text, target_lang: lang })
    });
    if (!res.ok) return null;
    const d = await res.json();
    return d.translations?.[0]?.text || null;
  } catch(e) { return null; }
}

// ===== API: Marginalia =====
async function fetchMarginalia(query) {
  try {
    const text = await corsProxy(`https://api.marginalia.nu/public/search/${enc(query)}`);
    if (!text) return null;
    const data = JSON.parse(text);
    return (data.results || []).slice(0, 10).map(r => ({
      title: r.title || r.url, url: r.url, desc: r.description || ''
    }));
  } catch(e) { return null; }
}

// ===== API: Wiby =====
async function fetchWiby(query) {
  try {
    const text = await corsProxy(`https://wiby.me/json/?q=${enc(query)}`);
    if (!text) return null;
    const data = JSON.parse(text);
    if (!Array.isArray(data)) return [];
    return data.slice(0, 10).map(r => ({
      title: r.Title || r.URL, url: r.URL, desc: r.Snippet || ''
    }));
  } catch(e) { return null; }
}

// ===== BUILD PANELS =====

function panelHeader(eng, query, tq) {
  const actualQ = tq || query;
  const openUrl = surl[eng.id](actualQ);
  return `<div class="panel-hd">
    <span class="p-name">${eng.name}</span>
    <span class="p-badge ${eng.bc}">${eng.badge}</span>
    ${tq ? `<span class="p-query" title="${esc(tq)}">${esc(tq)}</span>` : ''}
    <a class="p-open" href="${openUrl}" target="_blank" rel="noopener">open</a>
  </div>`;
}

function makeIframePanel(eng, query, tq) {
  const actualQ = tq || query;
  const el = document.createElement('div');
  el.className = 'panel';
  el.innerHTML = panelHeader(eng, query, tq) +
    `<div class="panel-body"><iframe src="${surl[eng.id](actualQ)}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" referrerpolicy="no-referrer"></iframe></div>`;
  return el;
}

function makeApiPanel(eng, query) {
  const el = document.createElement('div');
  el.className = 'panel';
  el.innerHTML = panelHeader(eng, query, null) +
    `<div class="panel-body"><div class="api-list"><div class="r-status">Searching...</div></div></div>`;

  const list = el.querySelector('.api-list');

  // Fetch results
  const fetchFn = eng.id === 'marginalia' ? fetchMarginalia : fetchWiby;
  fetchFn(query).then(results => {
    if (results === null) {
      list.innerHTML = '<div class="r-status">Could not reach this engine. Try the "open" link above.</div>';
    } else if (results.length === 0) {
      list.innerHTML = '<div class="r-status">No results found.</div>';
    } else {
      list.innerHTML = results.map(r =>
        `<div class="r">
          <a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a>
          <div class="r-u">${esc(r.url)}</div>
          ${r.desc ? `<div class="r-d">${esc(r.desc)}</div>` : ''}
        </div>`
      ).join('');
    }
  });

  return el;
}

function makeClickPanel(eng, query, tq) {
  const actualQ = tq || query;
  const openUrl = surl[eng.id](actualQ);
  const el = document.createElement('div');
  el.className = 'panel';
  el.innerHTML = panelHeader(eng, query, tq) +
    `<div class="click-body">
      <div class="cb-desc">${eng.desc}</div>
      <a class="cb-go" href="${openUrl}" target="_blank" rel="noopener">Search ${eng.name}</a>
      ${tq ? `<div class="cb-note">Translated: "${esc(tq)}"</div>` : ''}
    </div>`;
  return el;
}

// ===== MAIN SEARCH =====
async function doSearch() {
  const query = document.getElementById('q').value.trim();
  if (!query) return;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.classList.add('visible');

  const engines = mode === 'perspectives' ? perspectives_engines : deepweb_engines;

  // Translate in parallel
  const tps = {};
  for (const e of engines) {
    if (e.translate) tps[e.id] = translate(query, e.translate);
  }
  const translations = {};
  for (const [id, p] of Object.entries(tps)) {
    translations[id] = await p;
  }

  // Build panels
  for (const eng of engines) {
    const tq = translations[eng.id] || null;
    let panel;
    if (eng.type === 'iframe') {
      panel = makeIframePanel(eng, query, tq);
    } else if (eng.type === 'api') {
      panel = makeApiPanel(eng, query);
    } else {
      panel = makeClickPanel(eng, query, tq);
    }
    grid.appendChild(panel);
  }
}

// ===== EVENTS =====
document.getElementById('go').addEventListener('click', doSearch);
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('grid').innerHTML = '';
    document.getElementById('grid').classList.remove('visible');
  });
});

document.getElementById('stoggle').addEventListener('click', () => {
  const p = document.getElementById('spanel');
  p.classList.toggle('visible');
  if (p.classList.contains('visible')) document.getElementById('dk').value = dk;
});

document.getElementById('ssave').addEventListener('click', () => {
  dk = document.getElementById('dk').value.trim();
  localStorage.setItem('deepl_api_key', dk);
  document.getElementById('spanel').classList.remove('visible');
  document.getElementById('stoggle').textContent = dk ? 'Settings (DeepL ✓)' : 'Settings';
});

if (dk) document.getElementById('stoggle').textContent = 'Settings (DeepL ✓)';
</script>

</body>
</html>
